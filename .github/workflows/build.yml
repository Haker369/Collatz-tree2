name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy==1.26.4 matplotlib==3.8.4 customtkinter==5.2.2 pyinstaller==6.6.0

    - name: Compile to Single EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --collect-all customtkinter --name="CollatzTree" app.py

    - name: Upload Finished EXE
      uses: actions/upload-artifact@v4
      with:
        name: CollatzTree-Windows
        path: dist/CollatzTree.exe
